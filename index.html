<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Squidge — clay board</title>
<style>
:root{
  --bench:#2b2d26; --bench2:#353830; --label:#d8cfbb; --label-dim:#9a9484;
  --line:rgba(216,207,187,.14);
  --accent:#e8734a;
  font-family: ui-rounded, "SF Pro Rounded", "Hiragino Maru Gothic ProN", "Arial Rounded MT Bold", "Trebuchet MS", sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bench);color:var(--label);
  -webkit-user-select:none;user-select:none;touch-action:none;overscroll-behavior:none}
#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
#board{touch-action:none;border-radius:10px;box-shadow:0 18px 50px rgba(0,0,0,.55), 0 2px 0 rgba(255,255,255,.06) inset}

button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}

/* top bar */
#topbar{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;gap:8px;
  padding:calc(env(safe-area-inset-top) + 8px) 14px 8px;pointer-events:none}
#topbar>*{pointer-events:auto}
#wordmark{font-size:17px;font-weight:800;letter-spacing:.04em;color:var(--label);
  padding:6px 10px;border-radius:12px}
#wordmark b{color:var(--accent)}
.spacer{flex:1}
.chip{display:flex;align-items:center;gap:6px;background:var(--bench2);
  border:1px solid var(--line);border-radius:14px;padding:8px 12px;font-size:13px;
  font-weight:700;min-height:44px}
.chip:active{transform:scale(.96)}
.chip.on{background:var(--accent);color:#241812;border-color:transparent}
.chip svg{width:18px;height:18px;flex:none}

/* light + board popover */
#lightpop, #sizepop{position:fixed;right:12px;top:calc(env(safe-area-inset-top) + 62px);
  background:var(--bench2);border:1px solid var(--line);border-radius:16px;padding:14px 16px;
  display:none;flex-direction:column;gap:12px;min-width:250px;box-shadow:0 12px 30px rgba(0,0,0,.4);z-index:20}
#lightpop.open, #sizepop.open{display:flex}
#lightpop label, #sizepop label{font-size:12px;font-weight:700;color:var(--label-dim);letter-spacing:.05em}
#lightpop input[type=range]{width:100%}
.presets{display:flex;flex-wrap:wrap;gap:8px}
.preset{background:rgba(0,0,0,.28);border:1px solid var(--line);border-radius:12px;
  padding:8px 12px;font-size:12px;font-weight:700;color:var(--label);min-height:40px}
.preset:active{transform:scale(.95)}
.sizerow{display:flex;align-items:center;gap:8px}
.sizerow input[type=number]{width:84px;min-height:40px;background:rgba(0,0,0,.28);
  border:1px solid var(--line);border-radius:10px;color:var(--label);font:inherit;
  font-size:14px;font-weight:700;padding:6px 10px;text-align:center}
.keeprow{display:flex;align-items:center;gap:8px;font-size:12px}
.keeprow input{width:18px;height:18px}
.boardchips{display:flex;gap:10px}
.boardchip{width:34px;height:34px;border-radius:9px;border:2px solid var(--line)}
.boardchip.on{border-color:var(--accent)}

/* colour tray */
#tray{position:fixed;left:50%;transform:translateX(-50%);
  bottom:calc(env(safe-area-inset-bottom) + 96px);
  display:flex;align-items:center;gap:10px;background:var(--bench2);
  border:1px solid var(--line);border-radius:20px;padding:8px 12px;
  max-width:min(96vw,860px);box-shadow:0 10px 26px rgba(0,0,0,.35)}
#packbtn{font-size:12px;font-weight:800;color:var(--label-dim);padding:6px 4px;
  writing-mode:initial;white-space:nowrap;min-height:40px}
#swatches{display:flex;gap:8px;overflow-x:auto;padding:4px 2px;scrollbar-width:none}
#swatches::-webkit-scrollbar{display:none}
.ball{width:40px;height:40px;border-radius:50%;flex:none;border:none;position:relative;
  box-shadow:inset -5px -7px 9px rgba(0,0,0,.35), inset 5px 6px 8px rgba(255,255,255,.45),
  0 3px 4px rgba(0,0,0,.35)}
.ball.on::after{content:"";position:absolute;inset:11px;border-radius:50%;
  box-shadow:inset 2px 3px 5px rgba(0,0,0,.4);background:rgba(0,0,0,.13)}
#pickwrap{position:relative;flex:none;width:40px;height:40px}
#pickwrap .ball{background:conic-gradient(#e8564a,#f2b33d,#79c257,#4aa8d8,#8d6bc9,#e8564a)}
#pick{position:absolute;inset:0;opacity:0;width:100%;height:100%}

/* dock */
#dock{position:fixed;left:50%;transform:translateX(-50%);
  bottom:calc(env(safe-area-inset-bottom) + 10px);
  display:flex;align-items:center;gap:14px;background:var(--bench2);
  border:1px solid var(--line);border-radius:24px;padding:10px 16px;
  max-width:96vw;box-shadow:0 12px 30px rgba(0,0,0,.4)}
.tool{display:flex;flex-direction:column;align-items:center;gap:3px;width:58px;
  padding:6px 2px;border-radius:16px;font-size:11px;font-weight:800;color:var(--label-dim)}
.tool svg{width:30px;height:30px}
.tool.on{background:rgba(0,0,0,.28);color:var(--label)}
.tool.on svg .ink{fill:var(--accent)}
.tool.on svg .ink2{stroke:var(--accent)}
.tool:active{transform:scale(.94)}
@media (max-width:1080px){ .tool{width:46px} .tool svg{width:24px;height:24px} #dock{gap:8px;padding:10px 12px} }
.sliders{display:flex;flex-direction:column;gap:6px;width:min(30vw,190px)}
.srow{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:800;color:var(--label-dim)}
.srow span{width:52px;text-align:right;letter-spacing:.03em}
input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:30px;background:none}
input[type=range]::-webkit-slider-runnable-track{height:8px;border-radius:4px;background:rgba(0,0,0,.4)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;margin-top:-8px;
  border-radius:50%;background:var(--label);box-shadow:inset -3px -4px 5px rgba(0,0,0,.3), inset 3px 3px 4px rgba(255,255,255,.6), 0 2px 3px rgba(0,0,0,.4)}
#mixbtn{flex-direction:column}
#mixbtn .dot2{width:26px;height:15px;border-radius:8px;
  background:linear-gradient(90deg,#e8564a 0%,#e8564a 42%,#f2b33d 58%,#f2b33d 100%)}
#mixbtn.on .dot2{background:linear-gradient(90deg,#e8564a,#ee8844,#f2b33d)}

#toast{position:fixed;left:50%;top:calc(env(safe-area-inset-top) + 64px);transform:translateX(-50%);
  background:var(--bench2);border:1px solid var(--line);color:var(--label);
  padding:10px 18px;border-radius:14px;font-size:13px;font-weight:700;
  opacity:0;transition:opacity .25s;pointer-events:none;z-index:40}
#toast.show{opacity:1}
#file{display:none}

/* export preview overlay */
#exportov{position:fixed;inset:0;background:rgba(20,21,17,.86);display:none;
  align-items:center;justify-content:center;z-index:60;touch-action:auto}
#exportov.open{display:flex}
.ovcard{display:flex;flex-direction:column;align-items:center;gap:12px;max-width:86vw}
#ovimg{max-width:86vw;max-height:62vh;border-radius:10px;box-shadow:0 18px 60px rgba(0,0,0,.6);
  -webkit-user-select:auto;user-select:auto;-webkit-touch-callout:default;pointer-events:auto}
#ovhint{font-size:13px;font-weight:700;color:var(--label);text-align:center}
.ovrow{display:flex;gap:10px}

/* colour shifter panel */
#shiftpop{position:fixed;left:50%;transform:translateX(-50%);
  bottom:calc(env(safe-area-inset-bottom) + 158px);
  background:var(--bench2);border:1px solid var(--line);border-radius:18px;padding:12px 14px;
  display:none;flex-direction:column;gap:10px;z-index:25;box-shadow:0 12px 30px rgba(0,0,0,.4)}
#shiftpop.open{display:flex}
#shiftpop label{font-size:12px;font-weight:700;color:var(--label-dim)}
.shiftrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.slotwrap{position:relative;width:38px;height:38px}
.slotwrap .ball{width:38px;height:38px}
.slotwrap input[type=color]{position:absolute;inset:0;opacity:0;width:100%;height:100%}
#shiftbtn{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;
  font-weight:800;color:var(--label-dim);padding:4px 6px;border-radius:12px}
#shiftbtn .dots{display:flex;gap:2px}
#shiftbtn .dots i{width:7px;height:7px;border-radius:50%;display:block}
#shiftbtn.on{background:rgba(0,0,0,.28);color:var(--label)}

/* text tool panel */
#textpop{position:fixed;left:50%;transform:translateX(-50%);
  bottom:calc(env(safe-area-inset-bottom) + 158px);
  background:var(--bench2);border:1px solid var(--line);border-radius:18px;padding:12px 14px;
  display:none;gap:10px;align-items:center;z-index:25;box-shadow:0 12px 30px rgba(0,0,0,.4)}
#textpop.open{display:flex}
#textin{min-height:42px;background:rgba(0,0,0,.28);border:1px solid var(--line);border-radius:10px;
  color:var(--label);font:inherit;font-size:15px;font-weight:800;padding:6px 12px;width:200px;
  -webkit-user-select:auto;user-select:auto}
.toolstrip{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;max-width:52vw}
.toolstrip::-webkit-scrollbar{display:none}
@media (max-width:740px){
  .tool{width:48px}.tool svg{width:26px;height:26px}
  .sliders{width:34vw}
  #tray{bottom:calc(env(safe-area-inset-bottom) + 92px)}
}
</style>
</head>
<body>
<div id="stage"><canvas id="board"></canvas></div>

<div id="topbar">
  <div id="wordmark">squ<b>i</b>dge</div>
  <div class="spacer"></div>
  <button class="chip" id="undobtn" title="Undo">↩ undo</button>
  <button class="chip" id="redobtn" title="Redo">↪</button>
  <button class="chip" id="wigglebtn">〰 wiggle</button>
  <button class="chip" id="lightbtn">☀ light</button>
  <button class="chip" id="sizebtn">⤢ board</button>
  <button class="chip" id="pngbtn">png</button>
  <button class="chip" id="gifbtn">gif loop</button>
  <button class="chip" id="savebtn">save</button>
  <button class="chip" id="loadbtn">load</button>
  <button class="chip" id="clearbtn">✕ clear</button>
</div>

<div id="lightpop">
  <label>light direction</label>
  <input type="range" id="lightaz" min="0" max="360" value="225" step="1">
  <label>light height</label>
  <input type="range" id="lightel" min="15" max="75" value="42" step="1">
  <label>board colour</label>
  <div class="boardchips" id="boardchips"></div>
  <label>stitch motion (in loops)</label>
  <div class="shiftrow">
    <button class="chip on" id="stcrawl">crawl</button>
    <button class="chip" id="stwrig">wriggle</button>
  </div>
</div>

<div id="sizepop">
  <label>board size</label>
  <div class="presets">
    <button class="preset" data-w="0" data-h="0">fit screen</button>
    <button class="preset" data-w="1080" data-h="1080">square</button>
    <button class="preset" data-w="1080" data-h="1350">portrait</button>
    <button class="preset" data-w="1440" data-h="1080">landscape</button>
  </div>
  <div class="sizerow">
    <input type="number" id="cw" min="256" max="2048" step="1" placeholder="width">
    <span>×</span>
    <input type="number" id="ch" min="256" max="2048" step="1" placeholder="height">
    <button class="chip" id="applysize">apply</button>
  </div>
  <label class="keeprow"><input type="checkbox" id="keepart" checked> keep artwork (rescaled)</label>
</div>

<div id="tray">
  <button id="shiftbtn"><div class="dots"><i style="background:#d93a2b"></i><i style="background:#e8892b"></i><i style="background:#f2c53d"></i><i style="background:#58a04c"></i><i style="background:#3a7bc4"></i></div>shift</button>
  <button id="packbtn">classic ▸</button>
  <div id="swatches"></div>
  <div id="pickwrap"><div class="ball"></div><input type="color" id="pick" value="#e8734a"></div>
</div>

<div id="shiftpop">
  <div class="shiftrow">
    <label>colour shifter</label>
    <button class="chip" id="shifton">off</button>
    <button class="chip" id="shiftmode">in order</button>
  </div>
  <div class="shiftrow" id="shiftpresets"></div>
  <div class="shiftrow" id="shiftslots"></div>
</div>

<div id="textpop">
  <input id="textin" type="text" placeholder="type, then tap the board" maxlength="40">
  <button class="chip on" id="textraise">raised</button>
  <button class="chip" id="textpress">pressed</button>
</div>

<div id="exportov">
  <div class="ovcard">
    <img id="ovimg" alt="export">
    <p id="ovhint">press and hold the image, then Save to Photos</p>
    <div class="ovrow">
      <button class="chip" id="ovshare">share</button>
      <button class="chip" id="ovdl">download</button>
      <button class="chip" id="ovdone">done</button>
    </div>
  </div>
</div>

<div id="dock">
  <div class="toolstrip">
  <button class="tool on" id="t-blob"><svg viewBox="0 0 32 32"><path class="ink" fill="#9a9484" d="M16 5c6 0 11 4.5 11 10s-4 12-11 12S5 20.5 5 15 10 5 16 5z"/><ellipse cx="12.4" cy="11.4" rx="3.4" ry="2.2" fill="rgba(255,255,255,.5)"/></svg>blob</button>
  <button class="tool" id="t-sausage"><svg viewBox="0 0 32 32"><path class="ink" fill="#9a9484" d="M7 22c-2.8 0-4-2-4-4s1.2-4 4-4c5 0 7-6 13-6 4 0 7 2.6 7 6s-3 6-7 6c-4.4 0-6.5 2-13 2z" transform="rotate(-8 16 16)"/></svg>sausage</button>
  <button class="tool" id="t-smear"><svg viewBox="0 0 32 32"><path class="ink" fill="#9a9484" d="M8 24c-3-1.5-3.6-6 0-8 3-1.7 7 .6 10-2 2.5-2.2 1-6 5-7 3.2-.8 6 1.8 6 5 0 6-9 14-21 12z"/><path d="M10 20c4 1 8-1 11-4" stroke="rgba(255,255,255,.5)" stroke-width="2" fill="none" stroke-linecap="round"/></svg>smear</button>
  <button class="tool" id="t-scrape"><svg viewBox="0 0 32 32"><path class="ink" fill="#9a9484" d="M6 26l8-3L26 11l-5-5L9 18l-3 8z"/><path d="M21 6l5 5" stroke="rgba(255,255,255,.5)" stroke-width="2"/></svg>scrape</button>
  <button class="tool" id="t-flatten"><svg viewBox="0 0 32 32"><rect class="ink" fill="#9a9484" x="5" y="14" width="22" height="8" rx="4"/><path d="M10 9l3 4M16 8v5M22 9l-3 4" stroke="rgba(255,255,255,.5)" stroke-width="2" stroke-linecap="round"/></svg>flatten</button>
  <button class="tool" id="t-poke"><svg viewBox="0 0 32 32"><path class="ink" fill="#9a9484" d="M6 22c0-6 4.5-11 10-11s10 5 10 11-4.5 6-10 6S6 28 6 22z"/><circle cx="16" cy="19" r="4" fill="rgba(0,0,0,.35)"/></svg>poke</button>
  <button class="tool" id="t-cut"><svg viewBox="0 0 32 32"><path class="ink" fill="#9a9484" d="M16 4l3 7 7 1-5 5 1 7-6-3-6 3 1-7-5-5 7-1 3-7z"/></svg>cut</button>
  <button class="tool" id="t-stamp"><svg viewBox="0 0 32 32"><g fill="none" stroke="#9a9484" stroke-width="2.4" stroke-linecap="round" class="ink2"><path d="M16 24a8 8 0 1 1 0-16"/><path d="M16 20a4 4 0 1 1 0-8"/><circle cx="16" cy="16" r="0.8"/></g></svg>stamp</button>
  <button class="tool" id="t-felt"><svg viewBox="0 0 32 32"><path class="ink" fill="#9a9484" d="M8 9c5-3 12-3 16 0 1 5 1 9 0 14-5 3-12 3-16 0-1-5-1-9 0-14z"/><g stroke="rgba(255,255,255,.45)" stroke-width="1.4" stroke-linecap="round"><path d="M7 8l-2-2M25 8l2-2M7 24l-2 2M25 24l2 2M16 6V4M16 26v2"/></g></svg>felt</button>
  <button class="tool" id="t-stitch"><svg viewBox="0 0 32 32"><g class="ink2" stroke="#9a9484" stroke-width="3" stroke-linecap="round" fill="none"><path d="M5 22l4-3M13 16l4-3M21 10l4-3"/></g></svg>stitch</button>
  <button class="tool" id="t-text"><svg viewBox="0 0 32 32"><path class="ink" fill="#9a9484" d="M6 6h20v6h-3l-1-2h-4v16h3v3H11v-3h3V10h-4l-1 2H6V6z"/></svg>text</button>
  </div>
  <div class="sliders">
    <div class="srow"><span>size</span><input type="range" id="size" min="8" max="90" value="34"></div>
    <div class="srow"><span>squish</span><input type="range" id="squish" min="10" max="100" value="62"></div>
  </div>
  <button class="tool" id="mixbtn"><div class="dot2"></div>mix</button>
</div>

<div id="toast"></div>
<input type="file" id="file" accept=".clay">
<script>
"use strict";
/* ---------- sim buffers ---------- */
const stage = document.getElementById('stage');
const canvas = document.getElementById('board');
const DPR = Math.min(window.devicePixelRatio || 1, 1.6);
let W, H;
(function sizeCanvas(){
  const pad = 16, topH = 66, botH = 170;
  const availW = window.innerWidth - pad*2;
  const availH = window.innerHeight - topH - botH;
  const cssW = Math.max(320, availW), cssH = Math.max(280, availH);
  canvas.style.width = cssW + 'px'; canvas.style.height = cssH + 'px';
  canvas.style.marginTop = (topH - botH) + 'px';
  W = Math.min(1280, Math.round(cssW * DPR));
  H = Math.min(1280, Math.round(cssH * DPR));
  canvas.width = W; canvas.height = H;
})();
function fitDisplay(){
  const pad = 16, topH = 66, botH = 170;
  const availW = Math.max(280, window.innerWidth - pad*2);
  const availH = Math.max(240, window.innerHeight - topH - botH);
  const s = Math.min(availW/W, availH/H);
  canvas.style.width  = Math.round(W*s) + 'px';
  canvas.style.height = Math.round(H*s) + 'px';
  canvas.style.marginTop = (topH - botH) + 'px';
}
window.addEventListener('resize', fitDisplay);

const MAX_PIXELS = 2600000;
function setBoardSize(w,h,keepArt){
  w=Math.round(Math.min(2048,Math.max(256,w)));
  h=Math.round(Math.min(2048,Math.max(256,h)));
  if(w*h>MAX_PIXELS){
    const s=Math.sqrt(MAX_PIXELS/(w*h)); w=Math.round(w*s); h=Math.round(h*s);
    toast('capped to '+w+'×'+h+' to stay smooth');
  }
  const oW=W, oH=H, oC=colorBuf, oHt=heightBuf;
  W=w; H=h;
  canvas.width=W; canvas.height=H;
  const oM=matBuf, oP=paramBuf;
  colorBuf=new Uint8ClampedArray(W*H*4);
  heightBuf=new Float32Array(W*H);
  matBuf=new Uint8Array(W*H);
  paramBuf=new Uint8Array(W*H);
  strokeSnapBuf=new Float32Array(W*H);
  if(keepArt){
    for(let y=0;y<H;y++) for(let x=0;x<W;x++){
      const sx=Math.min(oW-1, x*oW/W|0), sy=Math.min(oH-1, y*oH/H|0);
      const si=sy*oW+sx, di=y*W+x;
      heightBuf[di]=oHt[si]; matBuf[di]=oM[si]; paramBuf[di]=oP[si];
      colorBuf[di*4]=oC[si*4]; colorBuf[di*4+1]=oC[si*4+1];
      colorBuf[di*4+2]=oC[si*4+2]; colorBuf[di*4+3]=oC[si*4+3];
    }
  }
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,colorTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, W, H, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
  gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D,heightTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.LUMINANCE_ALPHA, W, H, 0, gl.LUMINANCE_ALPHA, gl.UNSIGNED_BYTE, null);
  gl.activeTexture(gl.TEXTURE2); gl.bindTexture(gl.TEXTURE_2D,matTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.LUMINANCE_ALPHA, W, H, 0, gl.LUMINANCE_ALPHA, gl.UNSIGNED_BYTE, null);
  gl.uniform2f(U.uTexel, 1/W, 1/H);
  gl.uniform1f(U.uRelief, Math.max(W,H)/7);
  undoStack.length=0; redoStack.length=0;
  dirty=null; uploadAll(); fitDisplay(); needRender=true;
}

let colorBuf  = new Uint8ClampedArray(W*H*4);   // rgb + coverage in a
let heightBuf = new Float32Array(W*H);          // 0..1
let matBuf    = new Uint8Array(W*H);            // 0 board, 1 clay, 2 felt, 3 stitch
let paramBuf  = new Uint8Array(W*H);            // stitch arc phase
let strokeSnapBuf = new Float32Array(W*H);      // reused each stroke
let strokeSnapH = null;                          // height at stroke start (pieces stack on this)

/* ---------- webgl ---------- */
const gl = canvas.getContext('webgl', {preserveDrawingBuffer:true, antialias:false, alpha:false});
if(!gl){ document.body.innerHTML = '<p style="padding:2em">This needs WebGL — try Safari or Chrome.</p>'; throw new Error('no webgl'); }

const VS = `attribute vec2 aP; varying vec2 vUv;
void main(){ vUv = aP*0.5+0.5; vUv.y = 1.0-vUv.y; gl_Position = vec4(aP,0.,1.); }`;

const FS = `precision mediump float;
varying vec2 vUv;
uniform sampler2D uColor, uHeight, uMat;
uniform vec2 uTexel;
uniform vec3 uLight;
uniform vec3 uBoard;
uniform float uRelief, uTime, uJiggle, uStitchMode;
float hAt(vec2 uv){ vec4 t = texture2D(uHeight, uv); return dot(vec2(t.r, t.a), vec2(65280.0, 255.0))/65535.0; }
float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
void main(){
  vec2 uv = vUv;

    float h0 = hAt(uv);
    float m0 = smoothstep(0.003, 0.05, h0) * uJiggle;
    uv += m0 * 0.0026 * vec2(sin(uTime*2.0 + uv.y*34.0 + uv.x*11.0),
                             cos(uTime*3.0 + uv.x*29.0 - uv.y*13.0));

  float cov = c.a;
  vec4 mt = texture2D(uMat, uv);
  float m = floor(mt.r*255.0/80.0 + 0.5);       /* 0 board, 1 clay, 2 felt, 3 stitch */
  float prm = mt.a;                              /* stitch phase 0..1 */
  float fFelt   = step(1.5,m) - step(2.5,m);
  float fStitch = step(2.5,m);
  float h  = hAt(uv);
  float hx = hAt(uv + vec2(uTexel.x,0.)) - hAt(uv - vec2(uTexel.x,0.));
  float hy = hAt(uv + vec2(0.,uTexel.y)) - hAt(uv - vec2(0.,uTexel.y));
  float pres = smoothstep(0.002, 0.02, h);
  vec2 px = floor(uv/uTexel);
  float g1 = hash(px) - 0.5;
  float g2 = hash(floor(px/3.0)+7.3) - 0.5;
  float g3 = hash(floor(px/9.0)+3.1) - 0.5;
  float tooth = pres*cov*mix(1.0, 3.4, fFelt);   /* felt is much toothier */
  vec3 n = normalize(vec3(-hx*uRelief + (g1*0.10+g2*0.20+g3*0.22)*tooth,
                          -hy*uRelief + (g1*0.10-g2*0.16+g3*0.18)*tooth,
                           1.0));
  /* twisted thread ply across stitches */
  n.xy += fStitch*0.4*vec2(sin(prm*160.0), cos(prm*160.0));
  /* wriggle: stitches squirm in loops */
  n.xy += fStitch*uStitchMode*uJiggle*0.55*vec2(sin(uTime*3.0+prm*40.0), cos(uTime*2.0+prm*40.0));
  n = normalize(n);
  vec3 l = normalize(uLight);
  float wrap = mix(0.22, 0.5, fFelt);
  float diff = clamp((dot(n,l)+wrap)/(1.0+wrap), 0.0, 1.0);
  vec3 hv = normalize(l + vec3(0.,0.,1.));
  float spec = pow(max(dot(n,hv),0.0), 14.0) * 0.20 * pres * (0.75+g1*0.5);
  spec *= (1.0-fFelt) * (1.0+fStitch*0.8);
  vec2 ld = normalize(l.xy + vec2(1e-5));
  float occ = 0.0;
  for(int i=1;i<=6;i++){
    float fi = float(i);

  float a1 = ( hAt(uv+vec2( 4.0,0.)*uTexel) + hAt(uv-vec2( 4.0,0.)*uTexel)
             + hAt(uv+vec2(0., 4.0)*uTexel) + hAt(uv-vec2(0., 4.0)*uTexel) )*0.25;
  float a2 = ( hAt(uv+vec2( 7.0, 7.0)*uTexel) + hAt(uv+vec2(-7.0, 7.0)*uTexel)
             + hAt(uv+vec2( 7.0,-7.0)*uTexel) + hAt(uv+vec2(-7.0,-7.0)*uTexel) )*0.25;
  float crev = max(a1 - h, (a2 - h)*0.6);

  vec3 clay = alb * (0.34 + 0.74*diff) + spec;

  clay *= 1.0 + fStitch*(1.0-uStitchMode)*uJiggle*0.28*sin(prm*12.566 - uTime*2.0);

function mkShader(type, src){

  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));

const prog = gl.createProgram();

gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, FS));

const quad = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quad);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);

gl.enableVertexAttribArray(aP);

gl.bindTexture(gl.TEXTURE_2D, heightTex);

gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
gl.texImage2D(gl.TEXTURE_2D, 0, gl.LUMINANCE_ALPHA, W, H, 0, gl.LUMINANCE_ALPHA, gl.UNSIGNED_BYTE, null);

gl.bindTexture(gl.TEXTURE_2D, matTex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
gl.texImage2D(gl.TEXTURE_2D, 0, gl.LUMINANCE_ALPHA, W, H, 0, gl.LUMINANCE_ALPHA, gl.UNSIGNED_BYTE, null);

const U = {};
['uColor','uHeight','uMat','uTexel','uLight','uBoard','uRelief','uTime','uJiggle','uStitchMode']
  .forEach(n => U[n] = gl.getUniformLocation(prog, n));
gl.uniform1i(U.uColor, 0); gl.uniform1i(U.uHeight, 1); gl.uniform1i(U.uMat, 2);
gl.uniform2f(U.uTexel, 1/W, 1/H);
gl.uniform1f(U.uRelief, Math.max(W,H)/7);

/* ---------- state ---------- */
const state = {
  tool:'blob', size:34, squish:0.62, mix:true, pattern:0,
  text:'', textMode:'raised', stitchMode:0,
  shift:{on:false, mode:'cycle', idx:0,
    cols:[[217,58,43],[232,137,43],[242,197,61],[88,160,76],[58,123,196]]},
  color:[232,115,74],
  lightAz:225, lightEl:42,
  board:[0.914,0.886,0.816],
  wiggle:false,

function lightVec(t){
  let az = state.lightAz * Math.PI/180;
  if(t !== undefined) az += Math.sin(t)*0.55;             // wobble for loops
  const el = state.lightEl * Math.PI/180;
  return [Math.cos(az)*Math.cos(el), Math.sin(az)*Math.cos(el), Math.sin(el)];

/* ---------- dirty rect uploads ---------- */
let dirty = null;
function markDirty(x0,y0,x1,y1){
  x0=Math.max(0,Math.floor(x0)); y0=Math.max(0,Math.floor(y0));
  x1=Math.min(W,Math.ceil(x1));  y1=Math.min(H,Math.ceil(y1));
  if(x1<=x0||y1<=y0) return;
  if(!dirty) dirty=[x0,y0,x1,y1];
  else { dirty[0]=Math.min(dirty[0],x0); dirty[1]=Math.min(dirty[1],y0);
         dirty[2]=Math.max(dirty[2],x1); dirty[3]=Math.max(dirty[3],y1); }
}
function flushDirty(){
  if(!dirty) return;
  const [x0,y0,x1,y1] = dirty; dirty = null;
  const w = x1-x0, h = y1-y0;
  const cSub = new Uint8Array(w*h*4), hSub = new Uint8Array(w*h*2), mSub = new Uint8Array(w*h*2);
  for(let y=0;y<h;y++){

    cSub.set(colorBuf.subarray(src*4,(src+w)*4), dst*4);
    for(let x=0;x<w;x++){

      hSub[(dst+x)*2]   = v>>8;
      hSub[(dst+x)*2+1] = v&255;
      mSub[(dst+x)*2]   = matBuf[src+x]*80;

  gl.texSubImage2D(gl.TEXTURE_2D,0,x0,y0,w,h,gl.RGBA,gl.UNSIGNED_BYTE,cSub);
  gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D,heightTex);
  gl.texSubImage2D(gl.TEXTURE_2D,0,x0,y0,w,h,gl.LUMINANCE_ALPHA,gl.UNSIGNED_BYTE,hSub);
  gl.activeTexture(gl.TEXTURE2); gl.bindTexture(gl.TEXTURE_2D,matTex);

/* ---------- render loop ---------- */

function render(now){
  const t = (now - t0)/1000;
  const animating = state.wiggle;
  if(needRender || animating){
    flushDirty();
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,colorTex);
    gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D,heightTex);
    gl.activeTexture(gl.TEXTURE2); gl.bindTexture(gl.TEXTURE_2D,matTex);
    gl.viewport(0,0,W,H);
    gl.uniform1f(U.uStitchMode, state.stitchMode);
    gl.uniform3fv(U.uLight, lightVec(animating? t*2.4 : undefined));
    gl.uniform3fv(U.uBoard, state.board);
    gl.uniform1f(U.uTime, t*2.4);
    gl.uniform1f(U.uJiggle, animating? 1:0);
    gl.drawArrays(gl.TRIANGLES,0,3);
    needRender = false;
  }
  requestAnimationFrame(render);
}
requestAnimationFrame(render);

<script>
"use strict";
/* ---------- brush engine ---------- */
function clamp01(v){ return v<0?0:v>1?1:v; }
let strokePh=[0,0,0];                                   // per-stroke edge wobble phases
function noise2(x,y){ const s=Math.sin(x*12.9898+y*78.233)*43758.5453; return s-Math.floor(s); }
function edgeWobble(dx,dy){
  const a=Math.atan2(dy,dx);
  return 1 + 0.055*Math.sin(a*3+strokePh[0]) + 0.04*Math.sin(a*5+strokePh[1]) + 0.028*Math.sin(a*8+strokePh[2]);
}

/* a pressed lump: flat top, steep shoulder, sits fully ON TOP of the
   surface as it was at stroke start, hard slightly-wobbly silhouette */
function stampBlob(cx,cy,r,thick,col){
  const R=Math.ceil(r*1.15)+1;
  const x0=Math.max(0,cx-R), x1=Math.min(W,cx+R+1);
  const y0=Math.max(0,cy-R), y1=Math.min(H,cy+R+1);
  for(let y=y0;y<y1;y++){
    for(let x=x0;x<x1;x++){
      const dx=x-cx, dy=y-cy;
      const re=r*edgeWobble(dx,dy);
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>=re) continue;
      const dn=dist/re;
      const prof=Math.pow(1-dn*dn,0.35);
      const i=y*W+x;
      const base=strokeSnapH?strokeSnapH[i]:heightBuf[i];
      const target=clamp01(base + thick*prof*(0.96+0.08*noise2(x,y)));
      if(target>heightBuf[i]) heightBuf[i]=target;
      const a=Math.min(1,(re-dist)/1.4);                 // ~1px anti-aliased hard edge
      const j=i*4;
      colorBuf[j  ] += (col[0]-colorBuf[j  ])*a;
      colorBuf[j+1] += (col[1]-colorBuf[j+1])*a;
      colorBuf[j+2] += (col[2]-colorBuf[j+2])*a;
      colorBuf[j+3] = Math.max(colorBuf[j+3], a*255);
      if(a>0.5){ matBuf[i]=1; paramBuf[i]=0; }
    }
  }
  markDirty(cx-R,cy-R,cx+R+1,cy+R+1);
}

/* rolled coil: round cross-section, rides on top of the pre-stroke surface */
function stampSausage(cx,cy,r,thick,col){
  const R=Math.ceil(r*1.15)+1;
  const x0=Math.max(0,cx-R), x1=Math.min(W,cx+R+1);
  const y0=Math.max(0,cy-R), y1=Math.min(H,cy+R+1);
  for(let y=y0;y<y1;y++){
    for(let x=x0;x<x1;x++){
      const dx=x-cx, dy=y-cy;
      const re=r*edgeWobble(dx,dy);
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>=re) continue;
      const dn=dist/re;
      const prof=Math.sqrt(1-dn*dn);
      const i=y*W+x;
      const base=strokeSnapH?strokeSnapH[i]:heightBuf[i];
      const target=clamp01(base + thick*prof*(0.97+0.06*noise2(x,y)));
      if(target>heightBuf[i]) heightBuf[i]=target;
      const a=Math.min(1,(re-dist)/1.4);
      const j=i*4;
      colorBuf[j  ] += (col[0]-colorBuf[j  ])*a;
      colorBuf[j+1] += (col[1]-colorBuf[j+1])*a;
      colorBuf[j+2] += (col[2]-colorBuf[j+2])*a;
      colorBuf[j+3] = Math.max(colorBuf[j+3], a*255);
      if(a>0.5){ matBuf[i]=1; paramBuf[i]=0; }
    }
  }
  markDirty(cx-R,cy-R,cx+R+1,cy+R+1);
}

/* smear grabs a footprint of material and drags it */
let grab = null;
function grabAt(cx,cy,r){
  const s = (2*r|0)+2;
  const g = {s, col:new Float32Array(s*s*3), h:new Float32Array(s*s), cov:new Float32Array(s*s)};
  for(let y=0;y<s;y++) for(let x=0;x<s;x++){
    const px=cx-r+x|0, py=cy-r+y|0, k=y*s+x;
    if(px<0||py<0||px>=W||py>=H) continue;
    const i=py*W+px, j=i*4;
    if(matBuf[i]>=2) continue;                 /* only clay comes along for the ride */
    g.col[k*3]=colorBuf[j]; g.col[k*3+1]=colorBuf[j+1]; g.col[k*3+2]=colorBuf[j+2];
    g.h[k]=heightBuf[i]; g.cov[k]=colorBuf[j+3]/255;
  }
  return g;
}
function stampSmear(cx,cy,r,strength){
  if(!grab) return;
  const s = grab.s;
  for(let y=0;y<s;y++) for(let x=0;x<s;x++){
    const px=cx-r+x|0, py=cy-r+y|0;
    if(px<0||py<0||px>=W||py>=H) continue;
    const dx=(x-(s/2))/r, dy=(y-(s/2))/r, d2=dx*dx+dy*dy;
    if(d2>=1) continue;
    const f = (1-Math.sqrt(d2))*strength;
    const k=y*s+x, i=py*W+px, j=i*4;
    if(matBuf[i]>=2) continue;                 /* felt and stitches will not smear */
    heightBuf[i] += (grab.h[k]-heightBuf[i])*f;
    const gc = grab.cov[k];
    if(state.mix){
      const fa = f*Math.max(gc, 0.15);
      colorBuf[j  ] += (grab.col[k*3  ]-colorBuf[j  ])*fa;
      colorBuf[j+1] += (grab.col[k*3+1]-colorBuf[j+1])*fa;
      colorBuf[j+2] += (grab.col[k*3+2]-colorBuf[j+2])*fa;
    } else if(f>0.28 && gc>0.45){
      colorBuf[j]=grab.col[k*3]; colorBuf[j+1]=grab.col[k*3+1]; colorBuf[j+2]=grab.col[k*3+2];
    }
    const covNew = colorBuf[j+3]/255 + (gc - colorBuf[j+3]/255)*f;
    colorBuf[j+3] = clamp01(covNew)*255;
    if(colorBuf[j+3]>128) matBuf[i]=1;
    /* pick fresh material back into the grab as it moves */
    grab.h[k]   += (heightBuf[i]-grab.h[k])*0.22;
    grab.col[k*3]   += (colorBuf[j]  -grab.col[k*3]  )*0.22;
    grab.col[k*3+1] += (colorBuf[j+1]-grab.col[k*3+1])*0.22;
    grab.col[k*3+2] += (colorBuf[j+2]-grab.col[k*3+2])*0.22;
    grab.cov[k] += (colorBuf[j+3]/255-grab.cov[k])*0.22;
  }
  markDirty(cx-r,cy-r,cx+r+1,cy+r+1);
}

function stampScrape(cx,cy,r,strength){
  const x0=Math.max(0,cx-r|0), x1=Math.min(W,cx+r+1|0);
  const y0=Math.max(0,cy-r|0), y1=Math.min(H,cy+r+1|0);
  for(let y=y0;y<y1;y++) for(let x=x0;x<x1;x++){
    const dx=(x-cx)/r, dy=(y-cy)/r, d2=dx*dx+dy*dy;
    if(d2>=1) continue;
    const f=(1-Math.sqrt(d2))*strength;
    const i=y*W+x, j=i*4;
    if(matBuf[i]>=2) continue;
    heightBuf[i]*= (1-f*0.55);
    if(heightBuf[i]<0.008){
      colorBuf[j+3]*= (1-f*0.8);
      if(colorBuf[j+3]<6){ colorBuf[j+3]=0; heightBuf[i]=0; matBuf[i]=0; }
    }
  }
  markDirty(cx-r,cy-r,cx+r+1,cy+r+1);
}

/* press flat with a palm: heights move toward the local average */
function stampFlatten(cx,cy,r,strength){
  const x0=Math.max(0,cx-r|0), x1=Math.min(W,cx+r+1|0);
  const y0=Math.max(0,cy-r|0), y1=Math.min(H,cy+r+1|0);
  let sum=0, n=0;
  for(let y=y0;y<y1;y++) for(let x=x0;x<x1;x++){
    const dx=(x-cx)/r, dy=(y-cy)/r;
    if(dx*dx+dy*dy>=1) continue;
    const i=y*W+x;
    if(matBuf[i]===1 && colorBuf[i*4+3]>40){ sum+=heightBuf[i]; n++; }
  }
  if(!n) return;
  const mean=sum/n;
  for(let y=y0;y<y1;y++) for(let x=x0;x<x1;x++){
    const dx=(x-cx)/r, dy=(y-cy)/r, d2=dx*dx+dy*dy;
    if(d2>=1) continue;
    const i=y*W+x;
    if(matBuf[i]!==1 || colorBuf[i*4+3]<=40) continue;
    const f=(1-Math.sqrt(d2))*strength*0.5;
    heightBuf[i]+= (mean-heightBuf[i])*f;
  }
  markDirty(cx-r,cy-r,cx+r+1,cy+r+1);
}

/* fingertip dent pressed into the clay, stable within a stroke */
function stampPoke(cx,cy,r,depth){
  const x0=Math.max(0,cx-r|0), x1=Math.min(W,cx+r+1|0);
  const y0=Math.max(0,cy-r|0), y1=Math.min(H,cy+r+1|0);
  for(let y=y0;y<y1;y++) for(let x=x0;x<x1;x++){
    const dx=(x-cx)/r, dy=(y-cy)/r, d2=dx*dx+dy*dy;
    if(d2>=1) continue;
    const i=y*W+x;
    if(matBuf[i]!==1 || colorBuf[i*4+3]<30) continue;
    const prof=Math.sqrt(1-d2);
    const base=strokeSnapH?strokeSnapH[i]:heightBuf[i];
    const target=Math.max(0, base - depth*prof);
    if(target<heightBuf[i]) heightBuf[i]=target;
  }
  markDirty(cx-r,cy-r,cx+r+1,cy+r+1);
}

/* cookie-cut: remove clay with a crisp wobbled edge */
function stampCut(cx,cy,r){
  const R=Math.ceil(r*1.15)+1;
  const x0=Math.max(0,cx-R), x1=Math.min(W,cx+R+1);
  const y0=Math.max(0,cy-R), y1=Math.min(H,cy+R+1);
  for(let y=y0;y<y1;y++) for(let x=x0;x<x1;x++){
    const dx=x-cx, dy=y-cy;
    const re=r*edgeWobble(dx,dy);
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>=re) continue;
    const a=Math.min(1,(re-dist)/1.2);
    const i=y*W+x, j=i*4;
    heightBuf[i]*=(1-a);
    colorBuf[j+3]*=(1-a);
    if(colorBuf[j+3]<6){ colorBuf[j+3]=0; heightBuf[i]=0; matBuf[i]=0; paramBuf[i]=0; }
  }
  markDirty(cx-R,cy-R,cx+R+1,cy+R+1);
}

/* texture stamps carve a pattern into existing clay */
const PATTERNS=[
  {name:'fingerprint', fn:(x,y)=>0.5+0.5*Math.sin(Math.hypot(x-strokeSX,y-strokeSY)*(0.9/DPR)+noise2(x*0.05,y*0.05)*2.5)},
  {name:'stipple',     fn:(x,y)=>{const g=9*DPR; const gx=x-Math.round(x/g)*g, gy=y-Math.round(y/g)*g;
                                  return Math.max(0,1-Math.hypot(gx,gy)/(3*DPR));}},
  {name:'hatch',       fn:(x,y)=>Math.pow(0.5+0.5*Math.sin((x+y)*(0.9/DPR)),2)},
  {name:'weave',       fn:(x,y)=>{const s=0.75/DPR; return Math.max(
                                  Math.pow(0.5+0.5*Math.sin(x*s),3), Math.pow(0.5+0.5*Math.sin(y*s),3));}}
];
let strokeSX=0, strokeSY=0;
function stampTexture(cx,cy,r,depth){
  const pat=PATTERNS[state.pattern].fn;
  const x0=Math.max(0,cx-r|0), x1=Math.min(W,cx+r+1|0);
  const y0=Math.max(0,cy-r|0), y1=Math.min(H,cy+r+1|0);
  for(let y=y0;y<y1;y++) for(let x=x0;x<x1;x++){
    const dx=(x-cx)/r, dy=(y-cy)/r, d2=dx*dx+dy*dy;
    if(d2>=1) continue;
    const i=y*W+x;
    if(matBuf[i]!==1 || colorBuf[i*4+3]<30) continue;
    const f=Math.sqrt(1-d2);
    const base=strokeSnapH?strokeSnapH[i]:heightBuf[i];
    const target=Math.max(0, base - depth*pat(x,y)*f);
    if(target<heightBuf[i]) heightBuf[i]=target;
  }
  markDirty(cx-r,cy-r,cx+r+1,cy+r+1);
}

/* felt: thin fuzzy sheet with fibrous edges, sits on top like a patch */
function stampFelt(cx,cy,r,thick,col){
  const R=Math.ceil(r*1.3)+1;
  const x0=Math.max(0,cx-R), x1=Math.min(W,cx+R+1);
  const y0=Math.max(0,cy-R), y1=Math.min(H,cy+R+1);
  for(let y=y0;y<y1;y++){
    for(let x=x0;x<x1;x++){
      const dx=x-cx, dy=y-cy;
      const re=r*edgeWobble(dx,dy);
      const dist=Math.sqrt(dx*dx+dy*dy);
      const fuzz=re*1.22;
      if(dist>=fuzz) continue;
      const i=y*W+x, j=i*4;
      let a;
      if(dist<re) a=Math.min(1,(re-dist)/1.2);
      else{
        /* fibre fringe: sparse random hairs past the edge */
        const t=(dist-re)/(fuzz-re);
        if(noise2(x*1.7,y*1.7) > (1-t)*0.72) continue;
        a=(1-t)*0.7;
      }
      const dn=Math.min(1,dist/fuzz);
      const prof=Math.pow(1-dn*dn,0.22);
      const base=strokeSnapH?strokeSnapH[i]:heightBuf[i];
      const target=clamp01(base + thick*prof*(0.92+0.16*noise2(x,y)));
      if(target>heightBuf[i]) heightBuf[i]=target;
      colorBuf[j  ] += (col[0]-colorBuf[j  ])*a;
      colorBuf[j+1] += (col[1]-colorBuf[j+1])*a;
      colorBuf[j+2] += (col[2]-colorBuf[j+2])*a;
      colorBuf[j+3] = Math.max(colorBuf[j+3], a*255);
      if(a>0.3){ matBuf[i]=2; paramBuf[i]=0; }
    }
  }
  markDirty(cx-R*1.3,cy-R*1.3,cx+R*1.3+1,cy+R*1.3+1);
}

/* stitching: raised thread dashes sewn along the stroke */
let stitchArc=0, stitchPX=0, stitchPY=0;
function stampStitch(x,y,col){
  const d=Math.hypot(x-stitchPX,y-stitchPY);
  stitchArc+=d; stitchPX=x; stitchPY=y;
  const rT=Math.max(1.6, state.size*DPR*0.09+1.2);
  const dash=Math.max(6, state.size*DPR*0.42);
  const gap =dash*0.55 + rT*2.2;
  if((stitchArc%(dash+gap))>dash) return;      /* in a gap: skip, underneath shows */
  const R=Math.ceil(rT)+1;
  const x0=Math.max(0,(x|0)-R), x1=Math.min(W,(x|0)+R+1);
  const y0=Math.max(0,(y|0)-R), y1=Math.min(H,(y|0)+R+1);
  const thick=0.045 + state.squish*0.05;
  const prm=Math.round(stitchArc*1.5)&255;
  for(let yy=y0;yy<y1;yy++) for(let xx=x0;xx<x1;xx++){
    const ddx=(xx-x)/rT, ddy=(yy-y)/rT, d2=ddx*ddx+ddy*ddy;
    if(d2>=1) continue;
    const prof=Math.sqrt(1-d2);
    const i=yy*W+xx, j=i*4;
    const base=strokeSnapH?strokeSnapH[i]:heightBuf[i];
    const target=clamp01(base + thick*prof);
    if(target>heightBuf[i]) heightBuf[i]=target;
    const a=Math.min(1,(1-Math.sqrt(d2))*rT/0.9);
    colorBuf[j  ] += (col[0]-colorBuf[j  ])*a;
    colorBuf[j+1] += (col[1]-colorBuf[j+1])*a;
    colorBuf[j+2] += (col[2]-colorBuf[j+2])*a;
    colorBuf[j+3] = Math.max(colorBuf[j+3], a*255);
    if(a>0.4){ matBuf[i]=3; paramBuf[i]=prm; }
  }
  markDirty(x-R,y-R,x+R+1,y+R+1);
}

/* press or raise typed text in the clay */
const textCanvas=document.createElement('canvas');
function stampText(cx,cy,thick,col){
  const txt=(state.text||'').trim();
  if(!txt){ toast('type something in the text box first'); return false; }
  const fpx=Math.max(20, state.size*DPR*1.9);
  const font='800 '+fpx+'px ui-rounded, "SF Pro Rounded", "Arial Rounded MT Bold", "Trebuchet MS", sans-serif';
  let c2=textCanvas.getContext('2d');
  c2.font=font;
  const tw=Math.min(W-4, Math.ceil(c2.measureText(txt).width)+8), th=Math.min(H-4, Math.ceil(fpx*1.35));
  textCanvas.width=tw; textCanvas.height=th;
  c2=textCanvas.getContext('2d');
  c2.font=font; c2.textBaseline='middle'; c2.fillStyle='#fff';
  c2.fillText(txt,4,th/2);
  const img=c2.getImageData(0,0,tw,th).data;
  const ox=Math.round(Math.min(Math.max(cx-tw/2,0),W-tw));
  const oy=Math.round(Math.min(Math.max(cy-th/2,0),H-th));
  const raised=state.textMode!=='pressed';
  for(let y=0;y<th;y++) for(let x=0;x<tw;x++){
    const a=img[(y*tw+x)*4+3]/255;
    if(a<0.08) continue;
    const i=(oy+y)*W+(ox+x), j=i*4;
    const base=strokeSnapH?strokeSnapH[i]:heightBuf[i];
    if(raised){
      const target=clamp01(base + thick*Math.min(1,a*1.25));
      if(target>heightBuf[i]) heightBuf[i]=target;
      colorBuf[j  ] += (col[0]-colorBuf[j  ])*a;
      colorBuf[j+1] += (col[1]-colorBuf[j+1])*a;
      colorBuf[j+2] += (col[2]-colorBuf[j+2])*a;
      colorBuf[j+3] = Math.max(colorBuf[j+3], a*255);
      if(a>0.5){ matBuf[i]=1; paramBuf[i]=0; }
    }else{
      if(colorBuf[j+3]<30) continue;
      const target=Math.max(0, base - thick*a);
      if(target<heightBuf[i]) heightBuf[i]=target;
    }
  }
  markDirty(ox,oy,ox+tw,oy+th);
  return true;
}

/* ---------- undo ---------- */
const undoStack=[], redoStack=[], UNDO_MAX=6;
function snapshot(){
  const h16=new Uint16Array(W*H);
  for(let i=0;i<W*H;i++) h16[i]=Math.min(65535,heightBuf[i]*65535);
  return {c:colorBuf.slice(), h:h16, m:matBuf.slice(), p:paramBuf.slice()};
}
function pushUndo(){
  undoStack.push(snapshot());
  if(undoStack.length>UNDO_MAX) undoStack.shift();
  redoStack.length=0;
}
function restore(s){
  colorBuf.set(s.c);
  for(let i=0;i<W*H;i++) heightBuf[i]=s.h[i]/65535;
  if(s.m) matBuf.set(s.m); else matBuf.fill(0);
  if(s.p) paramBuf.set(s.p); else paramBuf.fill(0);
  uploadAll(); needRender=true;
}
function doUndo(){ if(!undoStack.length) return; redoStack.push(snapshot()); restore(undoStack.pop()); }
function doRedo(){ if(!redoStack.length) return; undoStack.push(snapshot()); restore(redoStack.pop()); }

/* ---------- pointer input ---------- */
let drawing=false, lastX=0, lastY=0, pendDist=0, activeId=null, lastPenT=-1e9;

function toSim(e){
  const rc = canvas.getBoundingClientRect();
  return [ (e.clientX-rc.left)/rc.width*W, (e.clientY-rc.top)/rc.height*H ];
}
function pressureOf(e){ return (e.pressure && e.pressure>0 && e.pressure<=1) ? e.pressure : 0.5; }

function strokeStamp(x,y,p){
  const pr = 0.55 + p*0.9;
  const r  = Math.max(3, state.size*DPR*0.5*pr);
  const thick = 0.05 + state.squish*(0.35+p*0.65)*0.24;   // layers stack ~6 deep
  if(state.tool==='blob')     stampBlob(x|0,y|0,r,thick,state.color);
  else if(state.tool==='sausage') stampSausage(x|0,y|0,r,thick*1.15,state.color);
  else if(state.tool==='smear')   stampSmear(x|0,y|0,r,0.55+p*0.4);
  else if(state.tool==='scrape')  stampScrape(x|0,y|0,r,0.5+p*0.5);
  else if(state.tool==='flatten') stampFlatten(x|0,y|0,r*1.3,0.5+p*0.5);
  else if(state.tool==='poke')    stampPoke(x|0,y|0,r,thick*1.1);
  else if(state.tool==='cut')     stampCut(x|0,y|0,r);
  else if(state.tool==='stamp')   stampTexture(x|0,y|0,r*1.2,thick*0.45);
  else if(state.tool==='felt')    stampFelt(x|0,y|0,r*1.1,thick*0.55,state.color);
  else if(state.tool==='stitch')  stampStitch(x,y,state.color);
  needRender=true;
}

canvas.addEventListener('pointerdown', e=>{
  if(e.pointerType==='touch' && performance.now()-lastPenT<700) return; // palm rejection
  if(activeId!==null){
    if(e.pointerType==='pen'){ drawing=false; activeId=null; grab=null; strokeSnapH=null; }
    else return;                              // one finger sculpts at a time
  }
  if(e.pointerType==='pen') lastPenT=performance.now();
  activeId=e.pointerId;
  canvas.setPointerCapture(e.pointerId);
  e.preventDefault();
  pushUndo();
  strokeSnapBuf.set(heightBuf); strokeSnapH = strokeSnapBuf;
  strokePh=[Math.random()*6.283, Math.random()*6.283, Math.random()*6.283];
  const [x,y]=toSim(e); lastX=x; lastY=y; pendDist=0; drawing=true;
  strokeSX=x; strokeSY=y;
  stitchArc=0; stitchPX=x; stitchPY=y;
  /* hue shifter: colour-laying tools change shade each stroke */
  if(state.shift.on && ['blob','sausage','text','felt','stitch'].indexOf(state.tool)>=0){
    const sh=state.shift;
    state.color=sh.cols[sh.idx];
    updateAccent(state.color);
    sh.idx = sh.mode==='random'
      ? (sh.idx + 1 + Math.floor(Math.random()*(sh.cols.length-1))) % sh.cols.length
      : (sh.idx+1) % sh.cols.length;
  }
  const p=pressureOf(e);
  if(state.tool==='text'){
    const thick=0.05 + state.squish*0.22;
    stampText(x|0,y|0,thick,state.color);
    needRender=true; drawing=false; activeId=null; strokeSnapH=null;
    return;
  }
  if(state.tool==='smear') grab = grabAt(x|0,y|0,Math.max(3,state.size*DPR*0.5));
  strokeStamp(x,y,p);
});

canvas.addEventListener('pointermove', e=>{
  if(e.pointerType==='pen') lastPenT=performance.now();
  if(!drawing || e.pointerId!==activeId) return;
  e.preventDefault();
  const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
  for(const ev of events){
    const [x,y]=toSim(ev), p=pressureOf(ev);
    const dx=x-lastX, dy=y-lastY, dist=Math.hypot(dx,dy);
    const spacing = state.tool==='stitch' ? Math.max(1, state.size*DPR*0.05)
                                          : Math.max(1.5, state.size*DPR*0.5*0.28);
    pendDist+=dist;
    if(pendDist>=spacing){
      const steps=Math.floor(pendDist/spacing);
      for(let s=1;s<=steps;s++){
        const t=s/steps;
        strokeStamp(lastX+dx*t, lastY+dy*t, p);
      }
      pendDist-=steps*spacing;
      lastX=x; lastY=y;
    }
  }
});

function endStroke(e){
  if(e.pointerId!==activeId) return;
  drawing=false; activeId=null; grab=null; strokeSnapH=null;
}
canvas.addEventListener('pointerup', endStroke);
canvas.addEventListener('pointercancel', endStroke);
document.addEventListener('gesturestart', e=>e.preventDefault());
document.addEventListener('contextmenu', e=>e.preventDefault());
</script>
<script>
"use strict";
/* ---------- ui helpers ---------- */
const $ = id => document.getElementById(id);
let toastT;
function toast(msg){
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200);
}

/* tools */
const toolBtns={blob:$('t-blob'),sausage:$('t-sausage'),smear:$('t-smear'),scrape:$('t-scrape'),
  flatten:$('t-flatten'),poke:$('t-poke'),cut:$('t-cut'),stamp:$('t-stamp'),
  felt:$('t-felt'),stitch:$('t-stitch'),text:$('t-text')};
for(const k in toolBtns) toolBtns[k].addEventListener('click',()=>{
  if(k==='stamp' && state.tool==='stamp'){
    state.pattern=(state.pattern+1)%PATTERNS.length;
    toast('texture: '+PATTERNS[state.pattern].name+' (tap again to switch)');
    return;
  }
  state.tool=k;
  $('textpop').classList.toggle('open', k==='text');
  if(k==='stamp') toast('texture: '+PATTERNS[state.pattern].name+' (tap again to switch)');
  for(const j in toolBtns) toolBtns[j].classList.toggle('on', j===k);
});
$('textin').addEventListener('input', e=> state.text=e.target.value);
$('textraise').addEventListener('click', ()=>{
  state.textMode='raised';
  $('textraise').classList.add('on'); $('textpress').classList.remove('on');
});
$('textpress').addEventListener('click', ()=>{
  state.textMode='pressed';
  $('textpress').classList.add('on'); $('textraise').classList.remove('on');
});
$('size').addEventListener('input', e=> state.size=+e.target.value);
$('squish').addEventListener('input', e=> state.squish=+e.target.value/100);
$('mixbtn').classList.add('on');
$('mixbtn').addEventListener('click', ()=>{
  state.mix=!state.mix;
  $('mixbtn').classList.toggle('on', state.mix);
  toast(state.mix? 'smearing blends colours':'smearing keeps colours pure');
});

/* palettes */
const PACKS=[
 {name:'classic', cols:['#d93a2b','#e8734a','#f2b33d','#58a04c','#2e9c8f','#3a7bc4','#7a5bbf','#e06a9f','#8a5a37','#f2ede4','#2d2a28']},
 {name:'sweetshop', cols:['#f9a8c9','#ffd2b0','#fde38c','#c9ec9e','#b8ece0','#a8d8f0','#d8b8f2','#f6f1e6']},
 {name:'mud & moss', cols:['#6b4f33','#8a6f4a','#a4986b','#5d6b45','#3f4a38','#8f8577','#c2b49a','#4a3b30']}
];
let packIdx=0;
function hexToRgb(h){ return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }
function rgbToHex(c){ return '#'+c.map(v=>v.toString(16).padStart(2,'0')).join(''); }
function updateAccent(rgb){
  document.documentElement.style.setProperty('--accent',`rgb(${rgb[0]},${rgb[1]},${rgb[2]})`);
}
function setColor(rgb, el){
  state.color=rgb;
  updateAccent(rgb);
  document.querySelectorAll('#swatches .ball').forEach(b=>b.classList.remove('on'));
  if(el) el.classList.add('on');
}
function buildSwatches(){
  const box=$('swatches'); box.innerHTML='';
  PACKS[packIdx].cols.forEach((hex,i)=>{
    const b=document.createElement('button');
    b.className='ball'; b.style.background=hex;
    b.addEventListener('click',()=>setColor(hexToRgb(hex),b));
    box.appendChild(b);
    if(i===1 && packIdx===0) { b.classList.add('on'); }
  });
  $('packbtn').textContent = PACKS[packIdx].name+' ▸';
}
$('packbtn').addEventListener('click',()=>{ packIdx=(packIdx+1)%PACKS.length; buildSwatches(); });
$('pick').addEventListener('input', e=> setColor(hexToRgb(e.target.value), null));
buildSwatches();

/* colour shifter */
const SHIFTSETS=[
 {name:'rainbow', cols:['#d93a2b','#e8892b','#f2c53d','#58a04c','#3a7bc4']},
 {name:'forest',  cols:['#1f3d2b','#4a6b3a','#7a8f4a','#8a5a37','#d9cfa8']},
 {name:'sunset',  cols:['#5b2a86','#c2417e','#e8734a','#f2b33d','#ffd9a8']},
 {name:'fire',    cols:['#7a1f1f','#d93a2b','#f26d21','#f7b32b','#fff3c4']},
 {name:'sea',     cols:['#16324f','#2e6f8e','#3fa7a3','#9fd8cb','#f2e9d8']}
];
const slotInputs=[];
function refreshSlots(){
  state.shift.cols.forEach((c,i)=>{
    slotInputs[i].value=rgbToHex(c);
    slotInputs[i].parentElement.firstChild.style.background=rgbToHex(c);
  });
  const dots=document.querySelectorAll('#shiftbtn .dots i');
  state.shift.cols.forEach((c,i)=>{ if(dots[i]) dots[i].style.background=rgbToHex(c); });
}
(function buildShiftUI(){
  const pr=$('shiftpresets');
  SHIFTSETS.forEach(s=>{
    const b=document.createElement('button');
    b.className='chip'; b.textContent=s.name;
    b.addEventListener('click',()=>{
      state.shift.cols=s.cols.map(hexToRgb); state.shift.idx=0; refreshSlots();
    });
    pr.appendChild(b);
  });
  const sl=$('shiftslots');
  for(let i=0;i<5;i++){
    const wrap=document.createElement('div'); wrap.className='slotwrap';
    const ball=document.createElement('div'); ball.className='ball';
    const inp=document.createElement('input'); inp.type='color';
    inp.addEventListener('input',e=>{
      state.shift.cols[i]=hexToRgb(e.target.value); state.shift.idx=0; refreshSlots();
    });
    wrap.appendChild(ball); wrap.appendChild(inp);
    sl.appendChild(wrap); slotInputs.push(inp);
  }
  refreshSlots();
})();
$('shiftbtn').addEventListener('click',()=>{
  $('textpop').classList.remove('open');
  $('shiftpop').classList.toggle('open');
});
$('shifton').addEventListener('click',()=>{
  state.shift.on=!state.shift.on; state.shift.idx=0;
  $('shifton').textContent=state.shift.on?'on':'off';
  $('shifton').classList.toggle('on',state.shift.on);
  $('shiftbtn').classList.toggle('on',state.shift.on);
  toast(state.shift.on?'shifter on: each stroke changes shade':'shifter off');
});
$('shiftmode').addEventListener('click',()=>{
  state.shift.mode = state.shift.mode==='cycle'?'random':'cycle';
  $('shiftmode').textContent = state.shift.mode==='cycle'?'in order':'random';
});

/* light + board popover */
$('lightbtn').addEventListener('click',()=>{ $('sizepop').classList.remove('open'); $('lightpop').classList.toggle('open'); });
$('sizebtn').addEventListener('click',()=>{
  $('lightpop').classList.remove('open');
  $('cw').value=W; $('ch').value=H;
  $('sizepop').classList.toggle('open');
});
document.querySelectorAll('#sizepop .preset').forEach(b=>{
  b.addEventListener('click',()=>{
    let w=+b.dataset.w, h=+b.dataset.h;
    if(!w){ const r=canvas.getBoundingClientRect(); w=Math.round(r.width*DPR); h=Math.round(r.height*DPR); }
    setBoardSize(w,h,$('keepart').checked);
    $('sizepop').classList.remove('open');
    toast('board is now '+W+'×'+H);
  });
});
$('applysize').addEventListener('click',()=>{
  const w=+$('cw').value||W, h=+$('ch').value||H;
  setBoardSize(w,h,$('keepart').checked);
  $('sizepop').classList.remove('open');
  toast('board is now '+W+'×'+H);
});
$('lightaz').addEventListener('input', e=>{ state.lightAz=+e.target.value; needRender=true; });
$('stcrawl').addEventListener('click',()=>{ state.stitchMode=0; needRender=true;
  $('stcrawl').classList.add('on'); $('stwrig').classList.remove('on'); });
$('stwrig').addEventListener('click',()=>{ state.stitchMode=1; needRender=true;
  $('stwrig').classList.add('on'); $('stcrawl').classList.remove('on'); });
$('lightel').addEventListener('input', e=>{ state.lightEl=+e.target.value; needRender=true; });
const BOARDS=['#e9e2d0','#a9b39a','#4a5058','#262624'];
const bc=$('boardchips');
BOARDS.forEach((hex,i)=>{
  const b=document.createElement('button'); b.className='boardchip'+(i===0?' on':'');
  b.style.background=hex;
  b.addEventListener('click',()=>{
    const c=hexToRgb(hex); state.board=[c[0]/255,c[1]/255,c[2]/255]; needRender=true;
    bc.querySelectorAll('.boardchip').forEach(x=>x.classList.remove('on')); b.classList.add('on');
  });
  bc.appendChild(b);
});

/* top actions */
$('undobtn').addEventListener('click', doUndo);
$('redobtn').addEventListener('click', doRedo);
$('wigglebtn').addEventListener('click', ()=>{
  state.wiggle=!state.wiggle;
  $('wigglebtn').classList.toggle('on', state.wiggle);
  needRender=true;
});
$('clearbtn').addEventListener('click', ()=>{
  pushUndo();
  colorBuf.fill(0); heightBuf.fill(0); matBuf.fill(0); paramBuf.fill(0);
  uploadAll(); needRender=true; toast('board wiped (undo brings it back)');
});

/* ---------- save / load ---------- */
function download(blob, name){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=name;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href); a.remove();},1500);
}
$('savebtn').addEventListener('click',()=>{
  const head=new Uint8Array(12);
  head.set([67,76,89,52]); // CLY4
  new DataView(head.buffer).setUint32(4,W,true);
  new DataView(head.buffer).setUint32(8,H,true);
  const hBytes=new Uint8Array(W*H*2);
  for(let i=0;i<W*H;i++){
    const v=Math.min(65535,heightBuf[i]*65535)|0;
    hBytes[i*2]=v>>8; hBytes[i*2+1]=v&255;
  }
  exportBlob(new Blob([head,hBytes,new Uint8Array(colorBuf.buffer.slice(0)),matBuf.slice(0),paramBuf.slice(0)],
    {type:'application/octet-stream'}),
    'squidge-'+Date.now()+'.clay');
  toast('project saved');
});
$('loadbtn').addEventListener('click',()=> $('file').click());
$('file').addEventListener('change', async e=>{
  const f=e.target.files[0]; if(!f) return; e.target.value='';
  const buf=new Uint8Array(await f.arrayBuffer());
  const ver = (buf[0]===67&&buf[1]===76&&buf[2]===89)? buf[3]-48 : 0;
  if(ver<1||ver>4){ toast('not a squidge .clay file'); return; }
  const dv=new DataView(buf.buffer);
  const sw=dv.getUint32(4,true), sh=dv.getUint32(8,true);
  const hLen=ver>=2? sw*sh*2 : sw*sh;
  const hSrc=buf.subarray(12, 12+hLen);
  const cSrc=buf.subarray(12+hLen, 12+hLen+sw*sh*4);
  const mSrc=ver>=4? buf.subarray(12+hLen+sw*sh*4, 12+hLen+sw*sh*5) : null;
  const pSrc=ver>=4? buf.subarray(12+hLen+sw*sh*5, 12+hLen+sw*sh*6) : null;
  pushUndo();
  for(let y=0;y<H;y++) for(let x=0;x<W;x++){
    const sx=Math.min(sw-1, x*sw/W|0), sy=Math.min(sh-1, y*sh/H|0);
    const si=sy*sw+sx, di=y*W+x;
    heightBuf[di]= ver>=2 ? (hSrc[si*2]*256+hSrc[si*2+1])/65535 : hSrc[si]/255;
    colorBuf[di*4]=cSrc[si*4]; colorBuf[di*4+1]=cSrc[si*4+1];
    colorBuf[di*4+2]=cSrc[si*4+2]; colorBuf[di*4+3]=cSrc[si*4+3];
    matBuf[di]= mSrc? mSrc[si] : (cSrc[si*4+3]>60?1:0);
    paramBuf[di]= pSrc? pSrc[si] : 0;
  }
  uploadAll(); needRender=true; toast('project loaded');
});

/* ---------- exports ---------- */
function exportBlob(blob, name){
  try{
    const f = new File([blob], name, {type: blob.type});
    if(navigator.canShare && navigator.canShare({files:[f]})){
      navigator.share({files:[f]}).catch(err=>{
        if(err && err.name!=='AbortError') download(blob, name);
      });
      return;
    }
  }catch(e){}
  download(blob, name);
}
let currentExport=null;
function showExport(blob, name){
  if(currentExport){ URL.revokeObjectURL(currentExport.url); }
  currentExport={blob, name, url:URL.createObjectURL(blob)};
  $('ovimg').src=currentExport.url;
  let shareable=false;
  try{
    const f=new File([blob], name, {type:blob.type});
    shareable = !!(navigator.canShare && navigator.canShare({files:[f]}));
  }catch(e){}
  $('ovshare').style.display = shareable? '' : 'none';
  $('exportov').classList.add('open');
}
$('ovshare').addEventListener('click',()=>{
  if(!currentExport) return;
  const f=new File([currentExport.blob], currentExport.name, {type:currentExport.blob.type});
  navigator.share({files:[f]}).catch(()=>{});
});
$('ovdl').addEventListener('click',()=>{
  if(currentExport) download(currentExport.blob, currentExport.name);
});
$('ovdone').addEventListener('click',()=>{
  $('exportov').classList.remove('open');
  if(currentExport){ URL.revokeObjectURL(currentExport.url); $('ovimg').src=''; currentExport=null; }
});
function renderStill(){
  flushDirty();
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,colorTex);
  gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D,heightTex);
  gl.activeTexture(gl.TEXTURE2); gl.bindTexture(gl.TEXTURE_2D,matTex);
  gl.viewport(0,0,W,H);
  gl.uniform1f(U.uStitchMode, state.stitchMode);
  gl.uniform3fv(U.uLight, lightVec());
  gl.uniform3fv(U.uBoard, state.board);
  gl.uniform1f(U.uTime, 0);
  gl.uniform1f(U.uJiggle, 0);
  gl.drawArrays(gl.TRIANGLES,0,3);
}
$('pngbtn').addEventListener('click',()=>{
  renderStill();
  const dataURL = canvas.toDataURL('image/png');
  const bin = atob(dataURL.split(',')[1]);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  showExport(new Blob([bytes],{type:'image/png'}), 'squidge-'+Date.now()+'.png');
  needRender=true;
});

<script>
"use strict";
/* ---------- ambient gif loop ---------- */
function renderFrame(theta){
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,colorTex);
  gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D,heightTex);
  gl.activeTexture(gl.TEXTURE2); gl.bindTexture(gl.TEXTURE_2D,matTex);
  gl.viewport(0,0,W,H);
  gl.uniform1f(U.uStitchMode, state.stitchMode);
  gl.uniform3fv(U.uLight, lightVec(theta));
  gl.uniform3fv(U.uBoard, state.board);
  gl.uniform1f(U.uTime, theta);
  gl.uniform1f(U.uJiggle, 1);
  gl.drawArrays(gl.TRIANGLES,0,3);
}

/* 252-colour cube palette (6r x 7g x 6b) with FS dithering */
function buildPalette(){
  const p=new Uint8Array(768);
  let n=0;
  for(let r=0;r<6;r++)for(let g=0;g<7;g++)for(let b=0;b<6;b++){
    p[n++]=Math.round(r*255/5); p[n++]=Math.round(g*255/6); p[n++]=Math.round(b*255/5);
  }
  return p; // remaining entries stay black
}
function quantize(img,w,h){
  const idx=new Uint8Array(w*h);
  const buf=new Float32Array(w*h*3);
  for(let i=0;i<w*h;i++){ buf[i*3]=img[i*4]; buf[i*3+1]=img[i*4+1]; buf[i*3+2]=img[i*4+2]; }
  const cl=(v,m)=>v<0?0:v>m?m:v;
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const i=(y*w+x)*3;
    const r=cl(buf[i],255), g=cl(buf[i+1],255), b=cl(buf[i+2],255);
    const ri=Math.round(r/255*5), gi=Math.round(g/255*6), bi=Math.round(b/255*5);
    idx[y*w+x]=ri*42+gi*6+bi;
    const er=r-ri*255/5, eg=g-gi*255/6, eb=b-bi*255/5;
    if(x+1<w){ const j=i+3; buf[j]+=er*7/16; buf[j+1]+=eg*7/16; buf[j+2]+=eb*7/16; }
    if(y+1<h){
      if(x>0){ const j=i+(w-1)*3; buf[j]+=er*3/16; buf[j+1]+=eg*3/16; buf[j+2]+=eb*3/16; }
      { const j=i+w*3; buf[j]+=er*5/16; buf[j+1]+=eg*5/16; buf[j+2]+=eb*5/16; }
      if(x+1<w){ const j=i+(w+1)*3; buf[j]+=er*1/16; buf[j+1]+=eg*1/16; buf[j+2]+=eb*1/16; }
    }
  }
  return idx;
}
function lzwEncode(pixels){
  const minCodeSize=8, clearCode=256, eoiCode=257;
  let codeSize=9, next=258, dict=new Map();
  const bytes=[]; let acc=0, nbits=0;
  const write=(code)=>{ acc|=code<<nbits; nbits+=codeSize;
    while(nbits>=8){ bytes.push(acc&255); acc>>=8; nbits-=8; } };
  write(clearCode);
  let prev=pixels[0];
  for(let i=1;i<pixels.length;i++){
    const c=pixels[i], key=(prev<<8)|c;
    const found=dict.get(key);
    if(found!==undefined){ prev=found; continue; }
    write(prev);
    if(next<4096){
      dict.set(key,next); next++;
      if(next>(1<<codeSize)&&codeSize<12) codeSize++;
    }else{
      write(clearCode); dict.clear(); next=258; codeSize=9;
    }
    prev=c;
  }
  write(prev); write(eoiCode);
  if(nbits>0) bytes.push(acc&255);
  return bytes;
}
async function exportGif(){
  toast('cooking the gif…');
  const gw=Math.min(560,W), gh=Math.round(H*gw/W);
  const tmp=document.createElement('canvas'); tmp.width=gw; tmp.height=gh;
  const tctx=tmp.getContext('2d');
  const FRAMES=22, DELAY=9; // ~2s loop
  const out=[];
  const pushStr=s=>{for(let i=0;i<s.length;i++)out.push(s.charCodeAt(i));};
  const push16=v=>{out.push(v&255,(v>>8)&255);};
  pushStr('GIF89a'); push16(gw); push16(gh);
  out.push(0xF7,0,0);
  const pal=buildPalette();
  for(let i=0;i<768;i++) out.push(pal[i]);
  out.push(0x21,0xFF,11); pushStr('NETSCAPE2.0'); out.push(3,1,0,0,0);
  for(let f=0;f<FRAMES;f++){
    renderFrame(f/FRAMES*Math.PI*2);
    tctx.drawImage(canvas,0,0,gw,gh);
    const img=tctx.getImageData(0,0,gw,gh).data;
    const idx=quantize(img,gw,gh);
    out.push(0x21,0xF9,4,0x04); push16(DELAY); out.push(0,0);
    out.push(0x2C); push16(0); push16(0); push16(gw); push16(gh); out.push(0);
    out.push(8);
    const lz=lzwEncode(idx);
    for(let i=0;i<lz.length;i+=255){
      const n=Math.min(255,lz.length-i);
      out.push(n);
      for(let j=0;j<n;j++) out.push(lz[i+j]);
    }
    out.push(0);
    await new Promise(r=>setTimeout(r,0));
  }
  out.push(0x3B);
  showExport(new Blob([new Uint8Array(out)],{type:'image/gif'}),'squidge-'+Date.now()+'.gif');
  needRender=true;
}
let gifBusy=false;
$('gifbtn').addEventListener('click', async ()=>{
  if(gifBusy) return; gifBusy=true;
  try{ await exportGif(); } catch(err){ toast('gif export failed'); console.error(err); }
  gifBusy=false;
});

/* first paint */
uploadAll(); needRender=true;
